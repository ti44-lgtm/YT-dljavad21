name: 01- 🎬 Youtube Downloader

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'YouTube video URL'
        required: true
        type: string
      quality:
        description: 'Video quality (best, 1080, 720, 480, audio)'
        required: false
        default: 'best'
        type: string
      split_threshold_mb:
        description: 'Split files larger than this MB (0 = never split)'
        required: false
        default: '90'
        type: string
      save_in_new_branch:
        description: 'Save video into a new branch (keeps main branch clean)'
        required: false
        default: false
        type: boolean

jobs:
  download-youtube:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache WARP Docker image
        id: cache-warp
        uses: actions/cache@v4
        with:
          path: warp-image.tar
          key: warp-image-${{ runner.os }}-v1

      - name: Load or pull WARP image
        run: |
          if [ -f warp-image.tar ]; then
            echo "🔄 Loading WARP image from cache..."
            docker load < warp-image.tar
          else
            echo "⬇️ Pulling WARP image..."
            docker pull caomingjun/warp
            docker save caomingjun/warp -o warp-image.tar
          fi

      - name: Start WARP Container
        run: |
          echo "🚀 Starting Cloudflare WARP container..."
          docker network create warp-net || true
          docker run -d \
            --name warp \
            --restart=always \
            --network warp-net \
            -p 1080:1080 \
            --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp
          echo "🔍 Checking WARP status (every second)..."
          for i in {1..30}; do
            sleep 1
            RESULT=$(curl -s --max-time 10 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "failed")
            if echo "$RESULT" | grep -qE "warp=(on|plus)"; then
              echo "✅ WARP is active!"
              echo "$RESULT"
              break
            fi
          done
          FINAL=$(curl -s --max-time 10 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "failed")
          if echo "$FINAL" | grep -qE "warp=(on|plus)"; then
            echo "✅ WARP proxy is ready!"
          else
            echo "⚠️ WARP might not be fully active, but continuing anyway..."
            echo "Response: $FINAL"
          fi

      - name: Cache apt packages
        id: cache-apt
        uses: actions/cache@v4
        with:
          path: ~/apt-cache
          key: apt-packages-${{ runner.os }}-v1

      - name: Install all packages
        run: |
          if [ -d ~/apt-cache ]; then
            echo "📦 Using cached apt packages..."
            sudo cp ~/apt-cache/*.deb /var/cache/apt/archives/ 2>/dev/null || true
          fi
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg python3-pip zip curl jq
          mkdir -p ~/apt-cache
          sudo cp /var/cache/apt/archives/*.deb ~/apt-cache/
          sudo chmod 644 ~/apt-cache/*.deb

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-ytdlp-v1
          restore-keys: |
            pip-${{ runner.os }}-ytdlp-

      - name: Install yt-dlp
        run: pip3 install --upgrade yt-dlp

      - name: Download YouTube Video
        run: |
          URL="${{ github.event.inputs.youtube_url }}"
          QUALITY="${{ github.event.inputs.quality }}"
          SPLIT_MB="${{ github.event.inputs.split_threshold_mb }}"
          SPLIT_BYTES=$(( SPLIT_MB * 1024 * 1024 ))

          mkdir -p videos tmp_downloads

          echo ""
          echo "📹 Downloading: $URL"
          echo "📊 Quality: $QUALITY"

          case "$QUALITY" in
            "audio")
              FORMAT="bestaudio/best"
              AUDIO_FLAGS="--extract-audio --audio-format mp3 --embed-thumbnail"
              ;;
            "best")
              FORMAT="bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best"
              AUDIO_FLAGS=""
              ;;
            "1080")
              FORMAT="bestvideo[height<=1080][ext=mp4]+bestaudio[ext=m4a]/best[height<=1080][ext=mp4]/best"
              AUDIO_FLAGS=""
              ;;
            "720")
              FORMAT="bestvideo[height<=720][ext=mp4]+bestaudio[ext=m4a]/best[height<=720][ext=mp4]/best"
              AUDIO_FLAGS=""
              ;;
            "480")
              FORMAT="bestvideo[height<=480][ext=mp4]+bestaudio[ext=m4a]/best[height<=480][ext=mp4]/best"
              AUDIO_FLAGS=""
              ;;
            *)
              FORMAT="bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best"
              AUDIO_FLAGS=""
              ;;
          esac

          yt-dlp \
            --proxy "socks5://127.0.0.1:1080" \
            --format "$FORMAT" \
            $AUDIO_FLAGS \
            --output "tmp_downloads/%(title)s.%(ext)s" \
            --no-playlist \
            --retries 10 \
            --fragment-retries 10 \
            --concurrent-fragments 4 \
            --no-check-certificates \
            --prefer-free-formats \
            --no-warnings \
            "$URL" || {
              echo "❌ yt-dlp failed, trying alternative method..."
              yt-dlp \
                --proxy "socks5://127.0.0.1:1080" \
                --format "$FORMAT" \
                $AUDIO_FLAGS \
                --output "tmp_downloads/%(title)s.%(ext)s" \
                --no-playlist \
                --retries 10 \
                --fragment-retries 10 \
                --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                --extractor-args "youtube:player_client=android" \
                "$URL"
            }

          echo "✅ Download complete!"
          ls -la tmp_downloads/

          for FILE in tmp_downloads/*; do
            [ -f "$FILE" ] || continue
            SIZE=$(stat -c%s "$FILE")
            BASENAME=$(basename "$FILE")
            echo "📁 Processing: $BASENAME ($(( SIZE / 1024 / 1024 ))MB)"

            if [ "$SPLIT_BYTES" -gt 0 ] && [ "$SIZE" -gt "$SPLIT_BYTES" ]; then
              echo "✂️ Splitting $BASENAME into ${SPLIT_MB}MB parts..."
              zip -0 -s "${SPLIT_MB}m" "videos/${BASENAME}.zip" -j "$FILE"
              echo "✅ Created $(ls videos/${BASENAME}.z* 2>/dev/null | wc -l) parts"
            else
              cp "$FILE" "videos/$BASENAME"
              echo "✅ Copied as-is (no split needed)"
            fi
          done
          rm -rf tmp_downloads

      - name: Commit & Push
        run: |
          SAVE_IN_NEW_BRANCH="${{ github.event.inputs.save_in_new_branch }}"
          if [ "$SAVE_IN_NEW_BRANCH" == "true" ]; then
            BRANCH="video-$(date +%Y%m%d-%H%M%S)-$(echo $RANDOM | md5sum | head -c 6)"
          else
            BRANCH="${GITHUB_REF_NAME}"
          fi

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if [ ! -d "videos" ] || [ -z "$(ls -A videos 2>/dev/null)" ]; then
            echo "❌ No files to commit in videos folder"
            exit 1
          fi

          # Force-add all files in videos/ to avoid pathspec issues
          git add -f videos/

          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi

          git commit -m "YouTube download – $(date +%Y%m%d-%H%M%S) [skip ci]"
          git pull --rebase origin "$BRANCH" || true
          git push origin HEAD:"$BRANCH"
          echo "✅ Pushed to branch: $BRANCH"
